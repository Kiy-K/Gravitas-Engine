# ─────────────────────────────────────────────────────────────────────────── #
# GRAVITAS Engine — Unified Configuration                                      #
# ─────────────────────────────────────────────────────────────────────────── #
#
# This file controls which scenario to load and which plugins to activate.
# Use with: python cli.py run --config configs/custom.yaml
#
# Scenarios are searched in:
#   1. gravitas/scenarios/
#   2. training/regimes/
#

scenario: airstrip_one
max_steps: 600
verbose: true

# ── Plugins ─────────────────────────────────────────────────────────────── #
# Plugins are loaded in order and executed sequentially on each step.
# Available built-in plugins:
#   - partisan_warfare       (Resistance cells behind enemy lines)
#   - logistics_network      (Supply chain interdiction)
#   - nonlinear_combat       (Non-linear combat dynamics)

plugins:
  - nonlinear_combat
  - logistics_network

# ── Plugin-specific configuration ───────────────────────────────────────── #

plugin_configs:
  nonlinear_combat:
    terrain_modifier: 1.2
    fortification_bonus: 0.35

  logistics_network:
    disruption_threshold: 0.4
    repair_rate: 0.02
